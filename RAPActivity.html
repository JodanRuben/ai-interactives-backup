<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Audit Tool</title>
    <style>
        :root {
            --bg-color: #F3F4F6;
            --panel-bg: #FFFFFF;
            --amber: #F59E0B;
            --amber-dark: #b45309;
            --blue: #2563EB;
            --blue-hover: #1D4ED8;
            --text-main: #1F2937;
            --text-muted: #4B5563;
            --border-color: #E5E7EB;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-main);
            display: flex;
            justify-content: center;
        }

        #app-container {
            width: 100%;
            max-width: 800px;
            position: relative;
        }

        #toolbar {
            background-color: var(--panel-bg);
            border-radius: 8px 8px 0 0;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .toolbar-text {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        button.primary-btn {
            background-color: var(--blue);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button.primary-btn:hover:not(:disabled) {
            background-color: var(--blue-hover);
        }

        button.primary-btn:disabled {
            background-color: #D1D5DB;
            cursor: not-allowed;
            color: #9CA3AF;
        }

        #document-panel {
            background-color: var(--panel-bg);
            padding: 40px 48px;
            border-radius: 0 0 8px 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            min-height: 600px;
            line-height: 1.7;
        }

        .doc-header {
            text-align: center;
            border-bottom: 2px solid var(--text-main);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .doc-header h1 {
            font-size: 1.4rem;
            margin: 0 0 8px 0;
        }

        .doc-header p {
            margin: 0;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .page {
            display: none;
            animation: fadeIn 0.3s ease-in;
        }

        .page.active {
            display: block;
        }

        h2 {
            font-size: 1.2rem;
            margin-top: 0;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
        }

        p {
            margin-bottom: 1.2rem;
        }

        .clickable {
            cursor: pointer;
            border-radius: 3px;
            transition: background-color 0.2s ease, color 0.2s ease;
            padding: 2px 0;
        }

        .clickable:hover {
            background-color: #e5e7eb;
        }

        .clickable.found {
            background-color: var(--amber);
            color: #000;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            font-size: 0.95rem;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        tr.clickable:hover td {
            background-color: #e5e7eb;
        }

        tr.clickable.found td {
            background-color: var(--amber);
            color: #000;
        }

        #summary-screen {
            display: none;
            background-color: var(--panel-bg);
            padding: 40px 48px;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            animation: fadeIn 0.4s ease-in;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 16px 24px;
            margin-top: 30px;
            margin-bottom: 40px;
            align-items: start;
        }

        .summary-item-left {
            font-weight: 600;
            color: var(--amber-dark);
            background-color: #FEF3C7;
            padding: 12px;
            border-radius: 4px;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        .summary-item-right {
            padding: 12px 0;
            color: var(--text-main);
            font-size: 0.95rem;
        }

        .reflection-prompt {
            text-align: center;
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-main);
            background-color: var(--bg-color);
            padding: 30px;
            border-radius: 8px;
            border-left: 4px solid var(--blue);
            margin-bottom: 30px;
        }

        .action-container {
            text-align: center;
            margin-top: 20px;
        }
